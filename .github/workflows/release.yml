name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the version PR branch + git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Creates a "Version Packages" PR when changesets are pending, or runs
      # `pnpm release` (build + changeset publish) when versions are ready.
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          # Runs the `ci:version` script (`changeset version && pnpm format`).
          # `changeset version` re-serializes package.json and expands short
          # arrays (files/sideEffects); `pnpm format` re-applies biome formatting
          # so the "Version Packages" commit stays lint-clean. Must be a single
          # script — changesets/action runs this without a shell, so a literal
          # `&&` here would be passed as an argument, not a command separator.
          version: pnpm ci:version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's generated .npmrc authenticates via NODE_AUTH_TOKEN
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
